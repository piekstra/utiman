name: release

# Cut a release by pushing a tag like `v0.1.0`. One macOS job (Apple Silicon,
# which cross-compiles the Intel target — the macOS SDK is universal) and one
# Linux job, independent (fail-fast: false) so a slow queue on one can never
# block the other's assets. Asset names are `utiman-<target-triple>.tar.gz`,
# the contract `utiman self-update` (pk-cli-selfupdate) matches on.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  # Gate the whole release on the pushed tag matching Cargo.toml's version.
  # `cargo build` bakes `env!("CARGO_PKG_VERSION")` into the binary as the
  # value `utiman self-update` compares against, so a tag/manifest mismatch
  # would ship binaries that self-report the wrong version and quietly break
  # the update check. One fast job the build matrix depends on catches it
  # before anything is built or published.
  verify:
    name: verify tag matches Cargo.toml
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Tag must equal Cargo.toml version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          manifest="$(grep -m1 '^version' Cargo.toml | sed -E 's/^version *= *"([^"]+)".*/\1/')"
          echo "pushed tag: v$tag   Cargo.toml version: $manifest"
          if [ "$tag" != "$manifest" ]; then
            echo "::error::Release tag v$tag does not match Cargo.toml version $manifest. Bump Cargo.toml (or retag) so the binary's baked-in version matches the release — utiman self-update compares against it." >&2
            exit 1
          fi

  build:
    name: build ${{ matrix.name }}
    needs: verify
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            name: apple (aarch64 + x86_64)
            targets: "aarch64-apple-darwin x86_64-apple-darwin"
          - os: ubuntu-latest
            name: linux x86_64
            targets: "x86_64-unknown-linux-gnu"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build and package each target
        run: |
          for t in ${{ matrix.targets }}; do
            rustup target add "$t"
            cargo build --release --target "$t"
            tar -C "target/$t/release" -czf "utiman-$t.tar.gz" utiman
            shasum -a 256 "utiman-$t.tar.gz" > "utiman-$t.tar.gz.sha256"
          done
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            utiman-*.tar.gz
            utiman-*.tar.gz.sha256
