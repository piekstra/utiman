# Town of Jupiter, FL — water/utility billing.
# CLI: https://github.com/piekstra/town-of-jupiter-fl-cli (binary `tojfl`)

id = "tojfl"
name = "Town of Jupiter Water"
kind = "water"
binary = "tojfl"
repo = "https://github.com/piekstra/town-of-jupiter-fl-cli"
description = "Town of Jupiter utility billing portal: account summary, billing and usage history, transactions."

[install]
kind = "cargo-git"
git = "https://github.com/piekstra/town-of-jupiter-fl-cli"
package = "tojfl-cli"

[auth]
required = true
login-command = "tojfl auth login --save"

# `tojfl account show --json` serializes the account summary; money values are
# objects like {"cents": 8421}, hence the `.cents` path and cents scale.
[summary]
args = ["account", "show", "--json"]
format = "json"
balance-fields = ["balance.cents"]
due-date-fields = ["due_date"]
scale = "cents"

# `tojfl usage list --json` / `bills list --json` emit bare arrays of records.
[[series]]
id = "usage"
name = "Water usage by period"
args = ["usage", "list", "--json"]
label-field = "period"
value-fields = ["quantity"]
chart = "bar"

[[series]]
id = "bills"
name = "Bill amounts"
args = ["bills", "list", "--json"]
label-field = "date"
value-fields = ["amount.cents"]
unit = "usd"
scale = "cents"
chart = "bar"

[[operations]]
id = "bills"
name = "Billing history"
args = ["bills", "list", "--json"]

[[operations]]
id = "usage"
name = "Usage comparison"
args = ["usage", "compare", "--json"]

[[operations]]
id = "transactions"
name = "Transactions"
args = ["transactions", "list", "--json"]
