# Loxahatchee River District — sewer/wastewater.
# CLI: https://github.com/piekstra/loxahatchee-river-fl-cli (binary `lrfl`)

id = "lrfl"
name = "Loxahatchee River Sewer"
kind = "sewer"
binary = "lrfl"
repo = "https://github.com/piekstra/loxahatchee-river-fl-cli"
description = "Loxahatchee River District: balance, charges, service status, and payment history. Guest-view reads; no login needed."

# One-time setup: reads are anonymous guest-view lookups by account number,
# so there is no login — just save your account once. The account number is
# non-secret (it's on your bill and in guest-view URLs), so utiman collects it
# in a form and runs `lrfl config set-account` directly.
[[setup]]
id = "account"
name = "Account number"
description = "The NNNNNNN-N number from your bill (e.g. 1234567-0)."
args = ["config", "set-account"]
placeholder = "1234567-0"

# lrfl conforms to piekstra-cli/1: family-default self-update spelling.
[install]
kind = "cargo-git"
git = "https://github.com/piekstra/loxahatchee-river-fl-cli"

[summary]
args = ["balance", "--json"]
format = "json"
balance-fields = ["balance_due"]
due-date-fields = ["services.0.due_date"]

[[series]]
id = "payments"
name = "Payments"
args = ["history", "--years", "2", "--json"]
items-path = "payments"
label-field = "payment_date"
value-fields = ["amount"]
unit = "usd"
chart = "bar"

[[operations]]
id = "charges"
name = "Charges & meter readings"
args = ["charges", "--json"]

[[operations]]
id = "history"
name = "Payment history"
args = ["history", "--json"]

[[operations]]
id = "status"
name = "Service status"
args = ["status", "--json"]

[[operations]]
id = "district"
name = "District info"
args = ["district", "--json"]

[pay]
open-args = ["pay", "--open"]
label = "Pay bill"
